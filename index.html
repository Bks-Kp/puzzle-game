<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>5x4 Puzzle Game</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: #f4f4f4;
    }
    h1 { margin-top: 20px; }
    #puzzle {
      width: 400px;
      height: 500px;
      margin: 20px auto;
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      grid-template-rows: repeat(4, 1fr);
      gap: 2px;
    }
    .tile {
      width: 100%;
      height: 100%;
      background-image: url('puzzle.png');
      background-size: 500px 400px;
      cursor: grab;
    }
    .dragging {
      opacity: 0.5;
    }
    button {
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <h1>🧩 5x4 Puzzle Game</h1>
  <button onclick="shuffle()">Shuffle</button>
  <div id="puzzle"></div>

  <script>
    const puzzle = document.getElementById("puzzle");
    const cols = 5;
    const rows = 4;
    let tiles = [];
    let draggedIndex = null;

    function createTiles() {
      puzzle.innerHTML = "";
      tiles = [];

      for (let i = 0; i < cols * rows; i++) {
        const tile = document.createElement("div");
        tile.classList.add("tile");
        tile.setAttribute("draggable", true);

        const x = i % cols;
        const y = Math.floor(i / cols);

        tile.style.backgroundPosition = `-${x * 80}px -${y * 125}px`;
        tile.dataset.index = i;

        tile.addEventListener("dragstart", () => {
          draggedIndex = tiles.indexOf(tile);
          tile.classList.add("dragging");
        });

        tile.addEventListener("dragend", () => {
          tile.classList.remove("dragging");
        });

        tile.addEventListener("dragover", (e) => e.preventDefault());

        tile.addEventListener("drop", () => {
          const dropIndex = tiles.indexOf(tile);
          swap(draggedIndex, dropIndex);
        });

        tiles.push(tile);
      }

      shuffle();
      render();
    }

    function shuffle() {
      for (let i = tiles.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [tiles[i], tiles[j]] = [tiles[j], tiles[i]];
      }
      render();
    }

    function swap(i, j) {
      [tiles[i], tiles[j]] = [tiles[j], tiles[i]];
      render();
      checkWin();
    }

    function render() {
      puzzle.innerHTML = "";
      tiles.forEach(t => puzzle.appendChild(t));
    }

    function checkWin() {
      let correct = true;
      tiles.forEach((tile, index) => {
        if (parseInt(tile.dataset.index) !== index) {
          correct = false;
        }
      });

      if (correct) {
        setTimeout(() => alert("🎉 Puzzle Completed!"), 100);
      }
    }

    createTiles();
  </script>
</body>
</html>
