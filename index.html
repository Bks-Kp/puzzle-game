<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pro Puzzle Game</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      color: white;
      text-align: center;
    }

    h1 { margin: 20px 0 5px; }

    .controls {
      display: flex;
      justify-content: center;
      gap: 15px;
      margin: 10px 0;
      flex-wrap: wrap;
    }

    .card {
      background: rgba(255,255,255,0.1);
      padding: 10px 15px;
      border-radius: 12px;
      min-width: 100px;
    }

    button {
      padding: 10px 20px;
      border: none;
      border-radius: 10px;
      background: #ff7a18;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    #puzzle {
      width: 90vw;
      max-width: 400px;
      aspect-ratio: 4/5;
      margin: 20px auto;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      grid-template-rows: repeat(5, 1fr);
      gap: 2px;
    }

    .tile {
      border-radius: 6px;
      cursor: grab;
      background-repeat: no-repeat;
    }

    .dragging { opacity: 0.5; }

    .modal {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.7);
      display: none;
      justify-content: center;
      align-items: center;
    }

    .modal-content {
      background: white;
      color: black;
      padding: 30px;
      border-radius: 12px;
      text-align: center;
    }

    .modal button { margin: 10px; }
  </style>
</head>
<body>

<h1>🧩 Puzzle Game</h1>

<div class="controls">
  <div class="card">⏱ Time: <span id="time">0</span>s</div>
  <div class="card">🎯 Moves: <span id="moves">0</span></div>
  <button onclick="shuffle()">Shuffle</button>
</div>

<div id="puzzle"></div>

<div id="proposal" class="modal">
  <div class="modal-content">
    <h2>💍 Will you marry me?</h2>
    <button onclick="alert('❤️ She said YES!')">Yes</button>
    <button onclick="alert('😅 Try again!')">No</button>
  </div>
</div>

<script>
  const puzzle = document.getElementById("puzzle");
  const cols = 4, rows = 5;
  let tiles = [];
  let draggedIndex = null;
  let moves = 0;
  let time = 0;
  let timer;

  const img = new Image();
  img.src = "puzzle.png";

  function startTimer() {
    clearInterval(timer);
    time = 0;
    timer = setInterval(() => {
      time++;
      document.getElementById("time").innerText = time;
    }, 1000);
  }

  function createTiles() {
    tiles = [];
    puzzle.innerHTML = "";

    const pieceWidth = img.width / cols;
    const pieceHeight = img.height / rows;

    for (let y = 0; y < rows; y++) {
      for (let x = 0; x < cols; x++) {

        const canvas = document.createElement("canvas");
        const ctx = canvas.getContext("2d");

        canvas.width = pieceWidth;
        canvas.height = pieceHeight;

        ctx.drawImage(
          img,
          x * pieceWidth,
          y * pieceHeight,
          pieceWidth,
          pieceHeight,
          0,
          0,
          pieceWidth,
          pieceHeight
        );

        const tile = document.createElement("div");
        tile.classList.add("tile");
        tile.style.backgroundImage = `url(${canvas.toDataURL()})`;
        tile.style.backgroundSize = "100% 100%";
        tile.setAttribute("draggable", true);

        const index = y * cols + x;
        tile.dataset.index = index;

        tile.addEventListener("dragstart", () => {
          draggedIndex = tiles.indexOf(tile);
          tile.classList.add("dragging");
        });

        tile.addEventListener("dragend", () => tile.classList.remove("dragging"));
        tile.addEventListener("dragover", e => e.preventDefault());

        tile.addEventListener("drop", () => {
          const dropIndex = tiles.indexOf(tile);
          swap(draggedIndex, dropIndex);
        });

        tiles.push(tile);
      }
    }

    shuffle();
    render();
    startTimer();
  }

  function shuffle() {
    for (let i = tiles.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [tiles[i], tiles[j]] = [tiles[j], tiles[i]];
    }
    moves = 0;
    document.getElementById("moves").innerText = moves;
    render();
    startTimer();
  }

  function swap(i, j) {
    if (i === null || j === null) return;
    [tiles[i], tiles[j]] = [tiles[j], tiles[i]];
    moves++;
    document.getElementById("moves").innerText = moves;
    render();
    checkWin();
  }

  function render() {
    puzzle.innerHTML = "";
    tiles.forEach(t => puzzle.appendChild(t));
  }

  function checkWin() {
    let correct = tiles.every((tile, i) => tile.dataset.index == i);
    if (correct) {
      clearInterval(timer);
      setTimeout(() => {
        document.getElementById("proposal").style.display = "flex";
      }, 300);
    }
  }

  img.onload = () => createTiles();
</script>

</body>
</html>
